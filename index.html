<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RTC - AR Frame Test</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; background: #000; font-family: sans-serif; }
        .ui-btn {
            position: fixed; z-index: 9999; border: none; border-radius: 50px; 
            color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #start-button {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 36px; background: #28a745; font-size: 18px;
        }
        #capture-mode-button {
            bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #ff4757; font-size: 16px; display: none;
        }
        #return-guide {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; z-index: 9999; font-size: 14px; display: none; pointer-events: none;
        }
    </style>
</head>
<body>
    <button id="start-button" class="ui-btn" onclick="startAR()">ARを開始する</button>
    <button id="capture-mode-button" class="ui-btn" onclick="enterCaptureMode()">撮影モード（UIを隠す）</button>
    <div id="return-guide">画面をタップしてボタンを表示</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true, precision: medium">
        
        <a-assets>
            <img id="frame-png" src="./frame.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="t" mindar-image-target="targetIndex: 0">
            <a-image id="ar-frame" src="#frame-png" 
                     width="3" height="3" 
                     position="0 0 0.1" 
                     rotation="0 0 0" 
                     visible="false"
                     material="transparent: true; alphaTest: 0.5;">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#t');
const frameEl = document.querySelector("#ar-frame");
const cameraEl = document.querySelector("a-camera"); // カメラを取得

targetEl.addEventListener("targetFound", () => {
    // 1. フレームを可視化する
    frameEl.setAttribute("visible", "true");

    // 2. フレームをターゲットからカメラの子供へ移動させる
    // これにより、マーカーが外れても画面に固定される
    cameraEl.appendChild(frameEl);

    // 3. カメラからの相対位置を調整（画面に張り付く位置）
    // zをマイナス（例: -0.5）にすると、カメラの目の前に固定されます
    // rotationも 0 0 0 にリセットして正面に向けます
    frameEl.setAttribute("position", "0 0 -0.5");
    frameEl.setAttribute("rotation", "0 0 0");
    frameEl.setAttribute("scale", "1 1 1"); // サイズもカメラに合わせて調整
});
    </script>
</body>
</html>
