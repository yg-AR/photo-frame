<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RTC - AR Frame Reset</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; background: #000; font-family: sans-serif; }
        
        /* ボタンを最前面に配置 */
        .ui-btn {
            position: fixed; z-index: 9999; border: none; border-radius: 50px; 
            color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 開始ボタン */
        #start-button {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 36px; background: linear-gradient(135deg, #28a745, #218838); font-size: 18px;
        }

        /* 撮影モードボタン */
        #cap-btn {
            bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #ff4757; font-size: 16px; display: none;
        }
    </style>
</head>
<body>
    <button id="start-button" class="ui-btn" onclick="startAR()">ARを開始する</button>
    <button id="cap-btn" class="ui-btn" onclick="toggleUI()">UIを隠して撮影</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true, precision: medium">
        
        <a-assets>
            <img id="frame-png" src="./frame.png">
        </a-assets>

       <a-camera id="main-camera" position="0 0 0" look-controls="enabled: false">
    <a-image id="ar-frame" src="#frame-png" 
             width="1.1" height="2.0" 
             position="0 0 -1" 
             rotation="0 0 0" 
             visible="false"
             material="transparent: true; shader: flat; side: double;">
    </a-image>
</a-camera>

<a-entity id="target-entity" mindar-image-target="targetIndex: 0">
</a-entity>
    </a-scene>

   <script>
    const targetEl = document.querySelector('#target-entity');
    const frameEl = document.querySelector("#ar-frame");
    const capBtn = document.querySelector("#cap-btn");

    // ターゲット認識時の挙動
    targetEl.addEventListener("targetFound", () => {
        // 1. カメラの中にあるフレームを表示する
        frameEl.setAttribute("visible", "true");
        
        // 2. 撮影ボタンを表示
        capBtn.style.display = "block";
        
        console.log("ターゲット認識：フレームを表示しました");
    });

    // ターゲット紛失時（targetLost）
    targetEl.addEventListener("targetLost", () => {
        // ここを空にすることで、一度表示されたフレームは消えなくなります
    });
    
    // AR開始関数などはそのまま
    function startAR() {
        document.querySelector('a-scene').systems["mindar-image-system"].start();
        document.querySelector("#start-button").style.display = "none";
    }
    
    // UI切り替え関数もそのまま
    function toggleUI() {
        capBtn.style.display = "none";
        setTimeout(() => {
            window.addEventListener('click', () => {
                capBtn.style.display = "block";
            }, { once: true });
        }, 500);
    }
</script>
</body>
</html>
