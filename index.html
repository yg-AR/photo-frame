<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RTC - Fixed Frame AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; background: #000; font-family: sans-serif; }
        .ui-btn {
            position: fixed; z-index: 9999; border: none; border-radius: 50px; 
            color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #start-button {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 36px; background: #28a745; font-size: 18px;
        }
        #capture-mode-button {
            bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #ff4757; font-size: 16px; display: none;
        }
        #guide-text {
            position: fixed; top: 40px; width: 100%; text-align: center;
            color: white; z-index: 9999; font-size: 14px; display: none; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 5px 0;
        }
    </style>
</head>
<body>
    <button id="start-button" class="ui-btn" onclick="startAR()">ARを開始する</button>
    <button id="capture-mode-button" class="ui-btn" onclick="enterCaptureMode()">撮影モード（UI隠し）</button>
    <div id="guide-text"></div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true, precision: medium">
        
        <a-assets>
            <img id="frame-png" src="./frame.png">
        </a-assets>

        <a-camera id="main-camera" position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
            <a-image id="ar-frame" src="#frame-png" 
                     width="1.5" height="1.5" 
                     position="0 0 0.1" 
                     rotation="0 0 0" 
                     visible="false"
                     material="transparent: true; alphaTest: 0.5;">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.querySelector("#start-button");
        const captureBtn = document.querySelector("#capture-mode-button");
        const guideText = document.querySelector("#guide-text");
        const targetEl = document.querySelector('#target-entity');
        const frameEl = document.querySelector("#ar-frame");
        const cameraEl = document.querySelector("#main-camera");

        let isFixed = false; // カメラ固定済みかどうかのフラグ

        function startAR() {
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            startBtn.style.display = "none";
            captureBtn.style.display = "block";
            arSystem.start();
        }

    // ターゲット発見時の処理
targetEl.addEventListener("targetFound", () => {
    if (!isFixed) {
        // 1. 表示をオンにする
        frameEl.setAttribute("visible", "true");

        // 2. 0.1秒待ってから移動と「固定」を確定させる
        setTimeout(() => {
            cameraEl.appendChild(frameEl);
            
            // カメラの目の前に固定（少し遠めに -1 を設定）
            frameEl.setAttribute("position", "0 0 -1"); 
            frameEl.setAttribute("rotation", "0 0 0");
            frameEl.setAttribute("scale", "1 1 1");
            
            // 重要：Mind-ARの自動制御から外すためクラス名を消す（もしあれば）
            frameEl.classList.remove("ar-elements"); 

            isFixed = true;
            showGuide("フレームを固定しました！");
        }, 100); 
    }
});

// ターゲット喪失時の処理
targetEl.addEventListener("targetLost", () => {
    // 【ここを修正】固定されていない時だけ非表示にする
    if (!isFixed) {
        frameEl.setAttribute("visible", "false");
    }
});

        function showGuide(msg) {
            guideText.innerText = msg;
            guideText.style.display = "block";
            setTimeout(() => { guideText.style.display = "none"; }, 3000);
        }

        function enterCaptureMode() {
            captureBtn.style.display = "none";
            showGuide("画面タップでボタンを表示");
            setTimeout(() => {
                window.addEventListener('click', exitCaptureMode, { once: true });
            }, 500);
        }

        function exitCaptureMode() {
            captureBtn.style.display = "block";
        }
    </script>
</body>
</html>
