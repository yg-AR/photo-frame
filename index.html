<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <button style="position:fixed; z-index:99; top:20px; left:20px; padding:20px;" onclick="startAR()">AR開始</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;">
        <a-assets>
            <img id="f-img" src="./frame.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" far="1000" near="0.01">
            <a-image id="target-frame" src="#f-img" 
                     width="1" height="1.5" 
                     position="0 0 -0.5" 
                     visible="false"
                     material="shader: flat; transparent: true; side: double;">
            </a-image>
        </a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <script>
        function startAR() {
            document.querySelector('a-scene').systems["mindar-image-system"].start();
        }

        const target = document.querySelector('#target');
        const frame = document.querySelector('#target-frame');

        target.addEventListener("targetFound", () => {
            console.log("ターゲットを見つけました");
            // 認識した瞬間に、無理やり表示を固定する
            frame.setAttribute("visible", "true");
        });
    </script>
</body>
</html>
