<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RTC - AR Fix</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .ui-btn {
            position: fixed; z-index: 9999; border: none; border-radius: 50px; 
            color: white; font-weight: bold; cursor: pointer;
        }
        #start-button {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 36px; background: #28a745; font-size: 18px;
        }
        #cap-btn {
            bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #ff4757; display: none;
        }
    </style>
</head>
<body>
    <button id="start-button" class="ui-btn" onclick="startAR()">ARを開始する</button>
    <button id="cap-btn" class="ui-btn" onclick="toggleUI()">UIを隠して撮影</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" vr-mode-ui="enabled: false">
        <a-assets>
            <img id="frame-png" src="./frame.png">
        </a-assets>

        <a-camera id="main-camera" position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
            <a-image id="ar-frame" src="#frame-png" 
                     width="1.5" height="2.5" 
                     position="0 0 0.01" 
                     visible="false"
                     material="transparent: true; shader: flat;">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        // ボタンの関数を、ブラウザがいつでも見つけられる場所に登録
        window.startAR = function() {
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl.systems["mindar-image-system"]) {
                sceneEl.systems["mindar-image-system"].start();
                document.getElementById("start-button").style.display = "none";
            }
        };

        window.toggleUI = function() {
            const btn = document.getElementById("cap-btn");
            btn.style.display = "none";
            setTimeout(() => {
                window.addEventListener('click', () => {
                    btn.style.display = "block";
                }, { once: true });
            }, 500);
        };

        // シーンの準備ができるまで待ってからリスナーを付ける
        document.addEventListener("DOMContentLoaded", () => {
            const targetEl = document.querySelector('#target-entity');
            const frameEl = document.querySelector("#ar-frame");
            const capBtn = document.querySelector("#cap-btn");

            targetEl.addEventListener("targetFound", () => {
                console.log("ターゲット発見");
                frameEl.setAttribute("visible", "true");
                capBtn.style.display = "block";
            });
        });
    </script>
</body>
</html>
