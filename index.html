<a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;">
    <a-assets>
        <img id="f-img" src="./frame.png">
    </a-assets>

    <a-camera id="main-camera" position="0 0 0" look-controls="enabled: false">
        <a-image id="fixed-frame" src="#f-img" 
                 width="1" height="1.5" 
                 position="0 0 -0.5" 
                 visible="false"
                 material="shader: flat; transparent: true;">
        </a-image>
    </a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-image id="follower-frame" src="#f-img" 
                 width="1" height="1.5" 
                 position="0 0 0.1" 
                 visible="false"
                 material="shader: flat; transparent: true;">
        </a-image>
    </a-entity>
</a-scene>

<script>
    const target = document.querySelector('#target');
    const follower = document.querySelector('#follower-frame');
    const fixed = document.querySelector('#fixed-frame');
    let hasBeenFound = false; // 一度でも見つけたか

    target.addEventListener("targetFound", () => {
        if (!hasBeenFound) {
            // 最初に見つけた瞬間だけ「固定用」に切り替える
            fixed.setAttribute("visible", "true");
            follower.setAttribute("visible", "false"); // 追従用は消す
            hasBeenFound = true; 
            
            // UI表示などの処理
            document.querySelector("#capture-mode-button").style.display = "block";
        }
    });

    target.addEventListener("targetLost", () => {
        // 固定済みなら何もしない（カメラ側のフレームは消えない）
        if (!hasBeenFound) {
            follower.setAttribute("visible", "false");
        }
    });
</script>
